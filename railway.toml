[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npx prisma generate --schema=packages/database/prisma/schema.prisma && npm run build -w @job-scheduler/database && npm run build -w apps/api && npm run build -w apps/worker"

[deploy]
startCommand = "node apps/api/dist/main.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
